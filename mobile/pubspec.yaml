name: car_workshop
description: Offline-first Car Service Workshop Management App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.1.0

  # Local database (SQLite, type-safe, reactive)
  drift: ^2.14.1
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.18

  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Secure storage (JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  collection: ^1.18.0

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
